name: Build macOS (Optional)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to attach successful macOS artifacts."
        required: false
        type: string
  schedule:
    - cron: "37 3 * * *"

permissions:
  contents: write
  actions: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-14
          - arch: arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          brew update
          brew install p7zip aria2

      - name: Fetch source
        env:
          CAMOUFOX_PASSWD: ${{ secrets.CAMOUFOX_PASSWD }}
        run: make fetch

      - name: Setup source and sdk path
        run: |
          make setup-minimal
          sdk_path="$(xcrun --sdk macosx --show-sdk-path)"
          if [[ -z "${sdk_path}" ]]; then
            echo "Unable to resolve macOS SDK path from xcrun." >&2
            exit 1
          fi
          echo "BUGOX_MACOS_SDK_PATH=${sdk_path}" >> "$GITHUB_ENV"
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          mkdir -p dist

      - name: Build macOS
        env:
          BUGOX_MACOS_SDK_PATH: ${{ env.BUGOX_MACOS_SDK_PATH }}
        run: python3 ./multibuild.py --target macos --arch ${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BugoxBuilds-macos-${{ matrix.arch }}
          path: dist/*

  release-macos-assets:
    needs: build-macos
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: BugoxBuilds-macos-*
          merge-multiple: true

      - name: Validate artifacts were produced
        id: check
        run: |
          count=$(find artifacts -type f | wc -l | tr -d ' ')
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          if [[ "${count}" == "0" ]]; then
            echo "No macOS artifacts produced." >&2
            exit 1
          fi

      - name: Attach macOS artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: artifacts/**/*

      - name: Refresh release manifest after macOS upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release-manifest.yml --ref "${GITHUB_REF_NAME}" -f version="${{ github.event.inputs.release_tag }}"
