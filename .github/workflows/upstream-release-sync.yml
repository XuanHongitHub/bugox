name: Upstream Release Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "11 */6 * * *"

permissions:
  contents: write
  actions: write

jobs:
  sync-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      UPSTREAM_REPO: daijro/camoufox
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest upstream release
        id: latest
        run: |
          TAG="$(python3 - <<'PY'
          import json
          import re
          import subprocess
          import sys

          repo = "daijro/camoufox"
          raw = subprocess.check_output(
              ["gh", "api", f"repos/{repo}/releases?per_page=30"],
              text=True,
          )
          releases = json.loads(raw)

          def detect_os(asset_name: str) -> set[str]:
              name = asset_name.lower()
              found = set()
              if re.search(r"(win|windows)|installer_x64|installer_arm64|win64|win[._-]?(x64|x86_64|arm64|aarch64)", name):
                  found.add("windows")
              if re.search(r"(linux|lin)", name):
                  found.add("linux")
              if re.search(r"(mac|darwin|osx)", name):
                  found.add("macos")
              return found

          selected = None
          for rel in releases:
              if rel.get("prerelease"):
                  continue
              assets = rel.get("assets") or []
              oses = set()
              for a in assets:
                  oses |= detect_os((a or {}).get("name", ""))
              if {"windows", "linux", "macos"}.issubset(oses):
                  selected = (rel.get("tag_name") or "").strip()
                  if selected:
                      break

          if not selected:
              sys.exit("No non-prerelease upstream release with Windows+Linux+macOS assets found.")

          print(selected)
          PY
          )"
          if [[ -z "${TAG}" ]]; then
            echo "Failed to resolve latest upstream release tag." >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Skip when already released in fork
        id: existing
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${TAG} already exists in fork."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mirror upstream release assets
        if: steps.existing.outputs.exists == 'false'
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          mkdir -p upstream-assets
          gh release download "${TAG}" --repo "${UPSTREAM_REPO}" --dir upstream-assets
          if [[ -z "$(ls -A upstream-assets)" ]]; then
            echo "Upstream release ${TAG} has no assets; refusing to create empty release." >&2
            exit 1
          fi
          gh release create "${TAG}" --title "${TAG}" --generate-notes
          gh release upload "${TAG}" upstream-assets/*

      - name: Trigger manifest publish
        if: steps.existing.outputs.exists == 'false'
        run: |
          gh workflow run release-manifest.yml --ref "${GITHUB_REF_NAME}" -f version="${{ steps.latest.outputs.tag }}"
