name: Build and Release (Required Lanes)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (e.g. v135.0.1-beta.24). Leave empty to build-only."
        required: false
        type: string
      include_linux:
        description: "Also build linux artifact (optional lane)."
        required: false
        default: false
        type: boolean

concurrency:
  group: bugox-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.required == false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            arch: x86_64
            required: true
          - target: linux
            arch: x86_64
            required: false

    steps:
      - name: Maximize build space
        if: matrix.target != 'linux' || github.event.inputs.include_linux == 'true'
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"
          verbose: "false"

      - name: Remove unwanted tools
        if: matrix.target != 'linux' || github.event.inputs.include_linux == 'true'
        # Originally from here: https://github.com/AdityaGarg8/remove-unwanted-software/blob/master/action.yml
        run: |
          sudo apt-get remove -y '^aspnetcore-.*' > /dev/null
          sudo apt-get remove -y '^dotnet-.*' > /dev/null
          sudo apt-get remove -y '^llvm-.*' > /dev/null
          sudo apt-get remove -y 'php.*' > /dev/null
          sudo apt-get remove -y '^mongodb-.*' > /dev/null
          sudo apt-get remove -y '^mysql-.*' > /dev/null
          sudo apt-get remove -y azure-cli google-chrome-stable firefox ${POWERSHELL} mono-devel libgl1-mesa-dri --fix-missing > /dev/null
          if [[ (${CODENAME} = focal) || (${CODENAME} = jammy) ]]; then
            sudo apt-get remove -y google-cloud-sdk --fix-missing > /dev/null
            sudo apt-get remove -y google-cloud-cli --fix-missing > /dev/null
          fi
          sudo apt-get autoremove -y > /dev/null
          sudo apt-get clean > /dev/null

      - uses: actions/checkout@v6
        if: matrix.target != 'linux' || github.event.inputs.include_linux == 'true'
        with:
          fetch-depth: 1

      - name: Set up Go
        if: matrix.target != 'linux' || github.event.inputs.include_linux == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Set up Python
        if: matrix.target != 'linux' || github.event.inputs.include_linux == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up LLVM
        if: matrix.target != 'linux' || github.event.inputs.include_linux == 'true'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y lld-18 clang-18
          if [ "${{ matrix.arch }}" != "x86_64" ]; then
            sudo apt-get install -y libc6-i386 lib32gcc-s1 lib32stdc++6 gcc-multilib g++-multilib
          fi
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-18 100

      - name: Check disk space
        if: matrix.target != 'linux' || github.event.inputs.include_linux == 'true'
        run: df -h

      - name: Install dependencies
        if: matrix.target != 'linux' || github.event.inputs.include_linux == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y msitools p7zip-full aria2

      - name: Fetch source
        if: matrix.target != 'linux' || github.event.inputs.include_linux == 'true'
        env:
          CAMOUFOX_PASSWD: ${{ secrets.CAMOUFOX_PASSWD }}
        run: |
          make fetch

      - name: Setup and bootstrap
        if: matrix.target != 'linux' || github.event.inputs.include_linux == 'true'
        run: |
          make setup-minimal
          make mozbootstrap
          mkdir -p dist

      - name: Create swap space
        if: matrix.target != 'linux' || github.event.inputs.include_linux == 'true'
        run: |
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Build
        if: matrix.target != 'linux' || github.event.inputs.include_linux == 'true'
        run: python3 ./multibuild.py --target ${{ matrix.target }} --arch ${{ matrix.arch }}

      - name: Upload artifacts
        if: always() && (matrix.target != 'linux' || github.event.inputs.include_linux == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: BugoxBuilds-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/*

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: >
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
