name: Build macOS (Optional)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to attach successful macOS artifacts."
        required: false
        type: string
  schedule:
    - cron: "37 3 * * *"

permissions:
  contents: write
  actions: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-13
          - arch: arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          brew update
          brew install p7zip aria2

      - name: Fetch source
        env:
          CAMOUFOX_PASSWD: ${{ secrets.CAMOUFOX_PASSWD }}
        run: make fetch

      - name: Setup and bootstrap
        run: |
          make setup-minimal
          make mozbootstrap
          mkdir -p dist

      - name: Build macOS
        run: python3 ./multibuild.py --target macos --arch ${{ matrix.arch }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BugoxBuilds-macos-${{ matrix.arch }}
          path: dist/*

  release-macos-assets:
    needs: build-macos
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: BugoxBuilds-macos-*
          merge-multiple: true

      - name: Skip when no artifacts are available
        id: check
        run: |
          count=$(find artifacts -type f | wc -l | tr -d ' ')
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          if [[ "${count}" == "0" ]]; then
            echo "No macOS artifacts produced; skipping release upload."
          fi

      - name: Attach macOS artifacts to release
        if: steps.check.outputs.count != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: artifacts/**/*

      - name: Refresh release manifest after macOS upload
        if: steps.check.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release-manifest.yml --ref "${GITHUB_REF_NAME}" -f version="${{ github.event.inputs.release_tag }}"
