name: Upstream Release Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "11 */6 * * *"

permissions:
  contents: write
  actions: write

jobs:
  sync-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      UPSTREAM_REPO: daijro/camoufox
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest upstream release
        id: latest
        run: |
          TAG="$(gh api repos/${UPSTREAM_REPO}/releases/latest --jq '.tag_name')"
          if [[ -z "${TAG}" ]]; then
            echo "Failed to resolve latest upstream release tag." >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Skip when already released in fork
        id: existing
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${TAG} already exists in fork."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger branded fork build/release
        if: steps.existing.outputs.exists == 'false'
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          echo "Triggering build.yml for branded Bugox release ${TAG} (mirror disabled)."
          gh workflow run build.yml --ref "${GITHUB_REF_NAME}" -f release_tag="${TAG}"
