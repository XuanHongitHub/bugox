name: Build macOS (Optional)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to attach successful macOS artifacts."
        required: false
        type: string
  schedule:
    - cron: "37 3 * * *"

permissions:
  contents: write
  actions: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
          - arch: arm64
    runs-on: ubuntu-24.04

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"
          verbose: "false"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y msitools p7zip-full aria2 unzip

      - name: Fetch source
        env:
          CAMOUFOX_PASSWD: ${{ secrets.CAMOUFOX_PASSWD }}
        run: make fetch

      - name: Prepare macOS SDK mirror
        env:
          BUGLOGIN_MACOS_SDK_URL: ${{ secrets.BUGLOGIN_MACOS_SDK_URL }}
          BUGLOGIN_MACOS_SDK_SHA256: ${{ secrets.BUGLOGIN_MACOS_SDK_SHA256 }}
          BUGLOGIN_MACOS_SDK_AUTH_HEADER: ${{ secrets.BUGLOGIN_MACOS_SDK_AUTH_HEADER }}
        run: |
          if [[ -z "${BUGLOGIN_MACOS_SDK_URL}" ]]; then
            echo "Missing secret BUGLOGIN_MACOS_SDK_URL. Configure SDK mirror first." >&2
            exit 1
          fi
          bash scripts/prepare-macos-sdk.sh

      - name: Setup source and sdk path
        run: |
          make setup-minimal
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          make mozbootstrap
          mkdir -p dist

      - name: Build macOS
        env:
          BUGOX_MACOS_SDK_PATH: ${{ env.BUGOX_MACOS_SDK_PATH }}
        run: python3 ./multibuild.py --target macos --arch ${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BugoxBuilds-macos-${{ matrix.arch }}
          path: dist/*

  release-macos-assets:
    needs: build-macos
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: BugoxBuilds-macos-*
          merge-multiple: true

      - name: Validate artifacts were produced
        id: check
        run: |
          count=$(find artifacts -type f | wc -l | tr -d ' ')
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          if [[ "${count}" == "0" ]]; then
            echo "No macOS artifacts produced." >&2
            exit 1
          fi

      - name: Attach macOS artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: artifacts/**/*

      - name: Refresh release manifest after macOS upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release-manifest.yml --ref "${GITHUB_REF_NAME}" -f version="${{ github.event.inputs.release_tag }}"
