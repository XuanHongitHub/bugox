name: Customize Fork Release

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream tag to pull"
        required: false
      fork_tag:
        description: "Fork release tag to publish"
        required: false

permissions:
  contents: write
  actions: write

jobs:
  customize-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      UPSTREAM_REPO: daijro/camoufox
      BROWSER_SLUG: bugox
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve upstream/fork tags
        id: tags
        env:
          INPUT_UPSTREAM_TAG: ${{ github.event.inputs.upstream_tag }}
          INPUT_FORK_TAG: ${{ github.event.inputs.fork_tag }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          upstream_repo = os.environ["UPSTREAM_REPO"]
          input_upstream = (os.environ.get("INPUT_UPSTREAM_TAG") or "").strip()
          input_fork = (os.environ.get("INPUT_FORK_TAG") or "").strip()

          def gh_json(path: str):
            out = subprocess.check_output(["gh", "api", path], text=True)
            return json.loads(out)

          def detect_os(name: str):
            name = (name or "").lower()
            found = set()
            if re.search(r"(win|windows)|installer_x64|installer_arm64|win64|win[._-]?(x64|x86_64|arm64|aarch64)", name):
              found.add("windows")
            if re.search(r"(linux|lin)", name):
              found.add("linux")
            if re.search(r"(mac|darwin|osx)", name):
              found.add("macos")
            return found

          if input_upstream:
            upstream_tag = input_upstream
          else:
            releases = gh_json(f"repos/{upstream_repo}/releases?per_page=40")
            upstream_tag = ""
            for rel in releases:
              if rel.get("prerelease"):
                continue
              oses = set()
              for asset in rel.get("assets") or []:
                oses |= detect_os((asset or {}).get("name", ""))
              if {"windows", "linux", "macos"}.issubset(oses):
                upstream_tag = (rel.get("tag_name") or "").strip()
                if upstream_tag:
                  break
            if not upstream_tag:
              sys.exit("No stable upstream release with Windows+Linux+macOS assets found.")

          fork_tag = input_fork or f"{upstream_tag}-buglogin.1"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"upstream_tag={upstream_tag}\n")
            fh.write(f"fork_tag={fork_tag}\n")
          print(f"Resolved upstream_tag={upstream_tag} fork_tag={fork_tag}")
          PY

      - name: Skip when fork release already exists
        id: existing
        run: |
          TAG="${{ steps.tags.outputs.fork_tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Fork release ${TAG} already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download upstream assets
        if: steps.existing.outputs.exists == 'false'
        run: |
          mkdir -p upstream-assets dist
          gh release download "${{ steps.tags.outputs.upstream_tag }}" \
            --repo "${UPSTREAM_REPO}" \
            --dir upstream-assets
          if [[ -z "$(ls -A upstream-assets)" ]]; then
            echo "No upstream assets downloaded." >&2
            exit 1
          fi

      - name: Repackage assets with Bugox customization
        if: steps.existing.outputs.exists == 'false'
        env:
          UPSTREAM_TAG: ${{ steps.tags.outputs.upstream_tag }}
          FORK_TAG: ${{ steps.tags.outputs.fork_tag }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import shutil
          import tempfile
          import zipfile

          upstream_tag = os.environ["UPSTREAM_TAG"]
          fork_tag = os.environ["FORK_TAG"]
          src_dir = pathlib.Path("upstream-assets")
          out_dir = pathlib.Path("dist")
          out_dir.mkdir(parents=True, exist_ok=True)

          def rename_asset(name: str) -> str:
            return (
              name.replace("camoufox", "bugox")
              .replace("Camoufox", "Bugox")
            )

          marker = {
            "browser": "bugox",
            "upstream_tag": upstream_tag,
            "fork_tag": fork_tag,
            "customization": "buglogin-fork-release",
          }

          for asset in src_dir.iterdir():
            if not asset.is_file():
              continue
            out_name = rename_asset(asset.name)
            out_path = out_dir / out_name
            if asset.suffix.lower() == ".zip":
              with tempfile.TemporaryDirectory() as tmp:
                tmp_path = pathlib.Path(tmp)
                with zipfile.ZipFile(asset, "r") as zf:
                  zf.extractall(tmp_path)
                marker_path = tmp_path / "BUGLOGIN_FORK_METADATA.json"
                marker_path.write_text(json.dumps(marker, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
                with zipfile.ZipFile(out_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
                  for item in tmp_path.rglob("*"):
                    if item.is_file():
                      zf.write(item, item.relative_to(tmp_path))
            else:
              shutil.copy2(asset, out_path)

          print("Customized assets:")
          for item in sorted(out_dir.iterdir()):
            print(f"- {item.name}")
          PY

      - name: Publish fork release
        if: steps.existing.outputs.exists == 'false'
        run: |
          TAG="${{ steps.tags.outputs.fork_tag }}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "BugLogin customized fork release from upstream ${{ steps.tags.outputs.upstream_tag }}."
          gh release upload "${TAG}" dist/*

      - name: Trigger manifest publish
        if: steps.existing.outputs.exists == 'false'
        run: |
          gh workflow run release-manifest.yml --ref "${GITHUB_REF_NAME}" -f version="${{ steps.tags.outputs.fork_tag }}"
