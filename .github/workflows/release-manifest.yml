name: Release Manifest & API Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (defaults to tag name)"
        required: false
      asset_url:
        description: "Artifact URL override"
        required: false
      sha256:
        description: "SHA256 override"
        required: false
      platform:
        description: "Target platform key (windows-x64, linux-x64, ...)"
        required: false
        default: "windows-x64"
      update_mode:
        description: "Update mode (optional|required)"
        required: false
        default: "optional"
      update_required:
        description: "Force required update (true/false)"
        required: false
        default: "false"
      min_supported_version:
        description: "Minimum supported version (required threshold)"
        required: false
      update_message:
        description: "Human-readable update note"
        required: false

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve metadata
        id: meta
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          fi
          ASSET_URL="${{ github.event.inputs.asset_url }}"
          SHA256="${{ github.event.inputs.sha256 }}"
          PLATFORM="${{ github.event.inputs.platform }}"
          UPDATE_MODE="${{ github.event.inputs.update_mode }}"
          UPDATE_REQUIRED="${{ github.event.inputs.update_required }}"
          MIN_SUPPORTED_VERSION="${{ github.event.inputs.min_supported_version }}"
          UPDATE_MESSAGE="${{ github.event.inputs.update_message }}"
          if [[ -z "$PLATFORM" ]]; then PLATFORM="windows-x64"; fi
          if [[ -z "$UPDATE_MODE" ]]; then UPDATE_MODE="optional"; fi
          if [[ -z "$UPDATE_REQUIRED" ]]; then UPDATE_REQUIRED="false"; fi
          if [[ -z "$ASSET_URL" && "${{ github.event_name }}" == "release" ]]; then
            ASSET_URL="$(python3 -c 'import json,sys; e=json.load(open(sys.argv[1], encoding="utf-8")); a=((e.get("release") or {}).get("assets") or []); print((a[0].get("browser_download_url", "") if a else ""))' "$GITHUB_EVENT_PATH")"
          fi
          if [[ -z "$SHA256" && "${{ github.event_name }}" == "release" ]]; then
            SHA_ASSET_URL="$(python3 -c 'import json,re,sys; e=json.load(open(sys.argv[1], encoding="utf-8")); a=((e.get("release") or {}).get("assets") or []); p=re.compile(r\"sha256|sha256sum|checksums?\", re.I); print(next((x.get(\"browser_download_url\", \"\") for x in a if p.search(str(x.get(\"name\", \"\")))), \"\"))' "$GITHUB_EVENT_PATH")"
            if [[ -n "$SHA_ASSET_URL" ]]; then
              SHA256="$(curl -fsSL "$SHA_ASSET_URL" | awk 'match($0,/[A-Fa-f0-9]{64}/){ print substr($0,RSTART,RLENGTH); exit }')"
            fi
          fi
          bash ./scripts/generate_release_manifest.sh bugox "$VERSION" stable "$ASSET_URL" "$SHA256" release-manifest.json "$PLATFORM" "$UPDATE_MODE" "$UPDATE_REQUIRED" "$MIN_SUPPORTED_VERSION" "$UPDATE_MESSAGE"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: bugox-release-manifest-${{ steps.meta.outputs.version }}
          path: release-manifest.json

      - name: Attach manifest to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: release-manifest.json

      - name: Publish manifest to BugLogin API
        env:
          BUGLOGIN_RELEASE_API_URL: ${{ secrets.BUGLOGIN_RELEASE_API_URL }}
          BUGLOGIN_RELEASE_API_TOKEN: ${{ secrets.BUGLOGIN_RELEASE_API_TOKEN }}
        run: |
          if [[ -z "${BUGLOGIN_RELEASE_API_URL}" || -z "${BUGLOGIN_RELEASE_API_TOKEN}" ]]; then
            echo "Missing BUGLOGIN_RELEASE_API_URL or BUGLOGIN_RELEASE_API_TOKEN; skipping API publish."
            exit 0
          fi
          curl -fsSL -X POST "${BUGLOGIN_RELEASE_API_URL}" \
            -H "Authorization: Bearer ${BUGLOGIN_RELEASE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @release-manifest.json
